name: Deploy to Azure Functions

on:
  push:
    branches:
      - master
    paths:
      - 'Code/DataPipelines/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd Code/DataPipelines
          pip install -r requirements-pipeline.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: |
          cd Code/DataPipelines
          zip -r deploy.zip . --exclude "*.pyc" --exclude "__pycache__/*" --exclude "venv/*" --exclude "venv_func/*" --exclude "local.settings.json" --exclude ".env"
          az functionapp deployment source config-zip \
            --resource-group FindCareDataPipelines-Dev \
            --name ${{ secrets.AZURE_FUNCTION_APP_NAME }} \
            --src deploy.zip
